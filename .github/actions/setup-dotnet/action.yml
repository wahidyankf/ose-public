name: "Setup .NET"
description: "Install .NET SDK, Fantomas, and fsharplint with NuGet cache"
inputs:
  dotnet-version:
    description: ".NET SDK version"
    required: false
    default: "10.0.x"
runs:
  using: "composite"
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.fsproj') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Install Fantomas
      shell: bash
      run: dotnet tool install -g fantomas

    - name: Install fsharplint
      shell: bash
      run: dotnet tool install -g dotnet-fsharplint
