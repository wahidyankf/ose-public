name: "Setup Python"
description: "Install Python, uv, and datamodel-code-generator with pip cache"
inputs:
  python-version:
    description: "Python version"
    required: false
    default: "3.13"
runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
        restore-keys: |
          pip-${{ runner.os }}-${{ inputs.python-version }}-

    - name: Install uv
      shell: bash
      run: pip install uv

    - name: Install datamodel-code-generator
      shell: bash
      run: pip install "datamodel-code-generator[http]"
