name: Backend - Spec Coverage

on:
  workflow_call:
    inputs:
      backend-name:
        required: true
        type: string
      language:
        required: true
        type: string
        description: "Language runtime (golang, jvm, dotnet, python, rust, elixir, clojure, typescript)"

permissions:
  contents: read

jobs:
  spec-coverage:
    name: Spec coverage ${{ inputs.backend-name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-language
        with:
          language: ${{ inputs.language }}
      - uses: ./.github/actions/install-language-deps
        with:
          language: ${{ inputs.language }}
          backend-name: ${{ inputs.backend-name }}
      - name: Generate contract types
        run: |
          npx nx run a-demo-contracts:bundle
          npx nx run ${{ inputs.backend-name }}:codegen
      - run: npx nx run ${{ inputs.backend-name }}:spec-coverage
