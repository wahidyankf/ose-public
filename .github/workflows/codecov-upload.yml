name: Codecov Upload

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  coverage:
    name: test:quick + upload coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Language setup via composite actions ---
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-clojure
      - uses: ./.github/actions/setup-golang
      - uses: ./.github/actions/setup-jvm
      - uses: ./.github/actions/setup-elixir
      - uses: ./.github/actions/setup-dotnet
      - uses: ./.github/actions/setup-python
      - uses: ./.github/actions/setup-rust
      - uses: ./.github/actions/setup-flutter

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.156.0"
          extended: true

      - name: Install Elixir dependencies
        run: |
          (cd libs/elixir-openapi-codegen && mix deps.get)
          (cd libs/elixir-gherkin && mix deps.get)
          (cd libs/elixir-cabbage && mix deps.get)
          (cd apps/a-demo-be-elixir-phoenix && mix deps.get)

      - name: Install Python dependencies
        run: (cd apps/a-demo-be-python-fastapi && uv sync)

      - name: Install Clojure dependencies
        run: |
          (cd libs/clojure-openapi-codegen && JAVA_HOME=${JAVA_HOME_21_X64:-$JAVA_HOME} clojure -P)
          (cd apps/a-demo-be-clojure-pedestal && JAVA_HOME=${JAVA_HOME_21_X64:-$JAVA_HOME} clojure -P && JAVA_HOME=${JAVA_HOME_21_X64:-$JAVA_HOME} clojure -P -M:test:coverage)

      - name: Generate contract types (required before test:quick and Flutter pub get)
        run: |
          mkdir -p libs/clojure-openapi-codegen/classes
          npx nx run a-demo-contracts:bundle
          npx nx run organiclever-contracts:bundle
          npx nx run-many -t codegen --projects=demo-*,organiclever-*

      - name: Restore .NET dependencies (required before --no-restore typecheck)
        run: |
          dotnet restore apps/a-demo-be-fsharp-giraffe/src/ADemoBeFsgi/ADemoBeFsgi.fsproj
          dotnet restore apps/a-demo-be-csharp-aspnetcore/src/ADemoBeCsas/ADemoBeCsas.csproj
          dotnet restore apps/organiclever-be/src/OrganicLeverBe/OrganicLeverBe.fsproj

      - name: typecheck (all projects)
        run: npx nx run-many -t typecheck --all --parallel=$(($(nproc) - 1))

      - name: test:quick (all projects)
        run: npx nx run-many -t test:quick --all --parallel=$(($(nproc) - 1))

      # --- Fix LCOV paths for monorepo (vitest/Python emit relative src/ paths) ---
      - name: Prepend app paths to LCOV source files
        run: |
          for app in oseplatform-web ayokoding-web organiclever-fe a-demo-fs-ts-nextjs a-demo-be-ts-effect a-demo-be-python-fastapi a-demo-fe-ts-nextjs a-demo-fe-ts-tanstack-start; do
            lcov="apps/${app}/coverage/lcov.info"
            if [ -f "$lcov" ]; then
              sed -i "s|^SF:|SF:apps/${app}/|" "$lcov"
              echo "Fixed paths in $lcov"
            fi
          done
          # C# coverage uses absolute paths — strip to repo-relative
          for lcov in apps/a-demo-be-csharp-aspnetcore/coverage/*/coverage.info; do
            if [ -f "$lcov" ]; then
              sed -i "s|^SF:${GITHUB_WORKSPACE}/||; s|^SF:/[^a]*apps/|SF:apps/|" "$lcov"
              echo "Fixed paths in $lcov"
            fi
          done

      # --- Coverage uploads ---

      - name: Upload coverage — oseplatform-web
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/oseplatform-web/coverage/lcov.info
          flags: oseplatform-web
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — ayokoding-web
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/ayokoding-web/coverage/lcov.info
          flags: ayokoding-web
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — organiclever-fe
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/organiclever-fe/coverage/lcov.info
          flags: organiclever-fe
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — organiclever-be
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/organiclever-be/coverage/altcov.info
          flags: organiclever-be
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — rhino-cli
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/rhino-cli/cover.out
          flags: rhino-cli
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — ayokoding-cli
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/ayokoding-cli/cover.out
          flags: ayokoding-cli
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — oseplatform-cli
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/oseplatform-cli/cover.out
          flags: oseplatform-cli
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — golang-commons
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: libs/golang-commons/cover.out
          flags: golang-commons
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — hugo-commons
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: libs/hugo-commons/cover.out
          flags: hugo-commons
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — a-demo-fs-ts-nextjs
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/a-demo-fs-ts-nextjs/coverage/lcov.info
          flags: a-demo-fs-ts-nextjs
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — a-demo-be-java-springboot
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/a-demo-be-java-springboot/target/site/jacoco/jacoco.xml
          flags: a-demo-be-java-springboot
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — a-demo-be-elixir-phoenix
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/a-demo-be-elixir-phoenix/cover/lcov.info
          flags: a-demo-be-elixir-phoenix
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — a-demo-be-fsharp-giraffe
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/a-demo-be-fsharp-giraffe/coverage/altcov.info
          flags: a-demo-be-fsharp-giraffe
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — a-demo-be-golang-gin
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/a-demo-be-golang-gin/cover.out
          flags: a-demo-be-golang-gin
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — a-demo-be-python-fastapi
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/a-demo-be-python-fastapi/coverage/lcov.info
          flags: a-demo-be-python-fastapi
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — a-demo-be-rust-axum
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/a-demo-be-rust-axum/coverage/lcov.info
          flags: a-demo-be-rust-axum
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — a-demo-be-kotlin-ktor
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/a-demo-be-kotlin-ktor/build/reports/kover/report.xml
          flags: a-demo-be-kotlin-ktor
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — a-demo-be-java-vertx
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/a-demo-be-java-vertx/target/site/jacoco/jacoco.xml
          flags: a-demo-be-java-vertx
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — a-demo-be-ts-effect
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/a-demo-be-ts-effect/coverage/lcov.info
          flags: a-demo-be-ts-effect
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — a-demo-be-csharp-aspnetcore
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/a-demo-be-csharp-aspnetcore/coverage/**/coverage.info
          flags: a-demo-be-csharp-aspnetcore
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — a-demo-be-clojure-pedestal
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/a-demo-be-clojure-pedestal/coverage/lcov.info
          flags: a-demo-be-clojure-pedestal
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — a-demo-fe-ts-nextjs
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/a-demo-fe-ts-nextjs/coverage/lcov.info
          flags: a-demo-fe-ts-nextjs
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — a-demo-fe-ts-tanstack-start
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/a-demo-fe-ts-tanstack-start/coverage/lcov.info
          flags: a-demo-fe-ts-tanstack-start
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage — a-demo-fe-dart-flutterweb
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/a-demo-fe-dart-flutterweb/coverage/lcov.info
          flags: a-demo-fe-dart-flutterweb
          disable_search: true
          fail_ci_if_error: false
