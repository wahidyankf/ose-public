name: Main CI

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-quick:
    name: test:quick — all projects
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Volta
        uses: volta-cli/action@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Setup Java 21 (Gradle/Kotlin — detekt requires JVM ≤24)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Java 25 (Maven/Vert.x — default JAVA_HOME)
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "27"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.156.0"
          extended: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Clojure CLI
        run: |
          curl -L -O https://github.com/clojure/brew-install/releases/latest/download/linux-install.sh
          chmod +x linux-install.sh
          sudo ./linux-install.sh
          rm linux-install.sh

      - name: Install clj-kondo
        run: |
          curl -sLO https://raw.githubusercontent.com/clj-kondo/clj-kondo/master/script/install-clj-kondo
          chmod +x install-clj-kondo
          sudo ./install-clj-kondo
          rm install-clj-kondo

      - name: Install .NET global tools
        run: |
          dotnet tool install -g fantomas
          dotnet tool install -g dotnet-fsharplint

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.10.1

      - name: Install oapi-codegen (Go OpenAPI codegen)
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest

      - name: Install datamodel-code-generator (Python OpenAPI codegen)
        run: pip install datamodel-code-generator[http]

      - name: Install dependencies
        run: npm ci

      - name: Install Elixir dependencies
        run: |
          (cd libs/elixir-openapi-codegen && mix deps.get)
          (cd libs/elixir-gherkin && mix deps.get)
          (cd libs/elixir-cabbage && mix deps.get)
          (cd apps/demo-be-elixir-phoenix && mix deps.get)

      - name: Install Python dependencies
        run: (cd apps/demo-be-python-fastapi && uv sync)

      - name: Install Clojure dependencies
        run: |
          (cd libs/clojure-openapi-codegen && JAVA_HOME=${JAVA_HOME_21_X64:-$JAVA_HOME} clojure -P)
          (cd apps/demo-be-clojure-pedestal && JAVA_HOME=${JAVA_HOME_21_X64:-$JAVA_HOME} clojure -P && JAVA_HOME=${JAVA_HOME_21_X64:-$JAVA_HOME} clojure -P -M:test:coverage)

      - name: Generate contract types (required before test:quick and Flutter pub get)
        run: |
          mkdir -p libs/clojure-openapi-codegen/classes
          npx nx run demo-contracts:bundle
          npx nx run-many -t codegen --projects=demo-*

      - name: Install Flutter dependencies
        run: (cd apps/demo-fe-dart-flutterweb && flutter pub get)

      - name: Restore .NET dependencies (required before --no-restore typecheck)
        run: |
          dotnet restore apps/demo-be-fsharp-giraffe/src/DemoBeFsgi/DemoBeFsgi.fsproj
          dotnet restore apps/demo-be-csharp-aspnetcore/src/DemoBeCsas/DemoBeCsas.csproj

      - name: typecheck (all projects)
        run: npx nx run-many -t typecheck --all

      - name: lint (all projects)
        run: npx nx run-many -t lint --all

      - name: test:quick (all projects)
        run: npx nx run-many -t test:quick --all

      - name: Upload coverage — rhino-cli
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/rhino-cli/cover.out
          flags: rhino-cli
          fail_ci_if_error: false

      - name: Upload coverage — ayokoding-cli
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/ayokoding-cli/cover.out
          flags: ayokoding-cli
          fail_ci_if_error: false

      - name: Upload coverage — oseplatform-cli
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/oseplatform-cli/cover.out
          flags: oseplatform-cli
          fail_ci_if_error: false

      - name: Upload coverage — golang-commons
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: libs/golang-commons/cover.out
          flags: golang-commons
          fail_ci_if_error: false

      - name: Upload coverage — hugo-commons
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: libs/hugo-commons/cover.out
          flags: hugo-commons
          fail_ci_if_error: false

      - name: Upload coverage — demo-be-java-springboot
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/demo-be-java-springboot/target/site/jacoco/jacoco.xml
          flags: demo-be-java-springboot
          fail_ci_if_error: false

      - name: Upload coverage — organiclever-web
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/organiclever-web/coverage/lcov.info
          flags: organiclever-web
          fail_ci_if_error: false

      - name: Upload coverage — demo-be-elixir-phoenix
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/demo-be-elixir-phoenix/cover/lcov.info
          flags: demo-be-elixir-phoenix
          fail_ci_if_error: false

      - name: Upload coverage — demo-be-fsharp-giraffe
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/demo-be-fsharp-giraffe/coverage/altcov.info
          flags: demo-be-fsharp-giraffe
          fail_ci_if_error: false

      - name: Upload coverage — demo-be-golang-gin
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/demo-be-golang-gin/cover.out
          flags: demo-be-golang-gin
          fail_ci_if_error: false

      - name: Upload coverage — demo-be-python-fastapi
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/demo-be-python-fastapi/coverage/lcov.info
          flags: demo-be-python-fastapi
          fail_ci_if_error: false

      - name: Upload coverage — demo-be-rust-axum
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/demo-be-rust-axum/coverage/lcov.info
          flags: demo-be-rust-axum
          fail_ci_if_error: false

      - name: Upload coverage — demo-be-kotlin-ktor
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/demo-be-kotlin-ktor/build/reports/kover/report.xml
          flags: demo-be-kotlin-ktor
          fail_ci_if_error: false

      - name: Upload coverage — demo-be-java-vertx
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/demo-be-java-vertx/target/site/jacoco/jacoco.xml
          flags: demo-be-java-vertx
          fail_ci_if_error: false

      - name: Upload coverage — demo-be-ts-effect
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/demo-be-ts-effect/coverage/lcov.info
          flags: demo-be-ts-effect
          fail_ci_if_error: false

      - name: Upload coverage — demo-be-csharp-aspnetcore
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/demo-be-csharp-aspnetcore/coverage/**/coverage.info
          flags: demo-be-csharp-aspnetcore
          fail_ci_if_error: false

      - name: Upload coverage — demo-be-clojure-pedestal
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/demo-be-clojure-pedestal/coverage/lcov.info
          flags: demo-be-clojure-pedestal
          fail_ci_if_error: false

      - name: Upload coverage — demo-fe-ts-nextjs
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/demo-fe-ts-nextjs/coverage/lcov.info
          flags: demo-fe-ts-nextjs
          fail_ci_if_error: false

      - name: Upload coverage — demo-fe-ts-tanstack-start
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/demo-fe-ts-tanstack-start/coverage/lcov.info
          flags: demo-fe-ts-tanstack-start
          fail_ci_if_error: false

      - name: Upload coverage — demo-fe-dart-flutterweb
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/demo-fe-dart-flutterweb/coverage/lcov.info
          flags: demo-fe-dart-flutterweb
          fail_ci_if_error: false
