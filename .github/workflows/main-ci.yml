name: Main CI

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-quick:
    name: test:quick — all projects
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Volta
        uses: volta-cli/action@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.156.0"
          extended: true

      - name: Install dependencies
        run: npm ci

      - name: test:quick (all projects)
        run: npx nx run-many -t test:quick --all

      - name: Generate JaCoCo XML report (organiclever-be)
        run: cd apps/organiclever-be && mvn jacoco:report -Pintegration

      - name: Upload coverage — rhino-cli
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/rhino-cli/cover.out
          flags: rhino-cli
          fail_ci_if_error: false

      - name: Upload coverage — ayokoding-cli
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/ayokoding-cli/cover.out
          flags: ayokoding-cli
          fail_ci_if_error: false

      - name: Upload coverage — oseplatform-cli
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/oseplatform-cli/cover.out
          flags: oseplatform-cli
          fail_ci_if_error: false

      - name: Upload coverage — golang-commons
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: libs/golang-commons/cover.out
          flags: golang-commons
          fail_ci_if_error: false

      - name: Upload coverage — hugo-commons
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: libs/hugo-commons/cover.out
          flags: hugo-commons
          fail_ci_if_error: false

      - name: Upload coverage — organiclever-be
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/organiclever-be/target/site/jacoco/jacoco.xml
          flags: organiclever-be
          fail_ci_if_error: false

      - name: Upload coverage — organiclever-web
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/organiclever-web/coverage/lcov.info
          flags: organiclever-web
          fail_ci_if_error: false
