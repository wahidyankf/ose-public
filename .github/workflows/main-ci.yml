name: Main CI

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-quick:
    name: test:quick — all projects
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Volta
        uses: volta-cli/action@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Setup Java 21 (Gradle/Kotlin — detekt requires JVM ≤24)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Java 25 (Maven/Vert.x — default JAVA_HOME)
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "27"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.156.0"
          extended: true

      - name: Install .NET global tools
        run: |
          dotnet tool install -g fantomas
          dotnet tool install -g dotnet-fsharplint

      - name: Install dependencies
        run: npm ci

      - name: Install Elixir dependencies
        run: |
          (cd libs/elixir-gherkin && mix deps.get)
          (cd libs/elixir-cabbage && mix deps.get)
          (cd apps/demo-be-exph && mix deps.get)

      - name: Install Python dependencies
        run: (cd apps/demo-be-pyfa && uv sync)

      - name: test:quick (all projects)
        run: npx nx run-many -t test:quick --all

      - name: Generate JaCoCo XML report (demo-be-jasb)
        run: cd apps/demo-be-jasb && mvn jacoco:report -Pintegration

      - name: Upload coverage — rhino-cli
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/rhino-cli/cover.out
          flags: rhino-cli
          fail_ci_if_error: false

      - name: Upload coverage — ayokoding-cli
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/ayokoding-cli/cover.out
          flags: ayokoding-cli
          fail_ci_if_error: false

      - name: Upload coverage — oseplatform-cli
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/oseplatform-cli/cover.out
          flags: oseplatform-cli
          fail_ci_if_error: false

      - name: Upload coverage — golang-commons
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: libs/golang-commons/cover.out
          flags: golang-commons
          fail_ci_if_error: false

      - name: Upload coverage — hugo-commons
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: libs/hugo-commons/cover.out
          flags: hugo-commons
          fail_ci_if_error: false

      - name: Upload coverage — demo-be-jasb
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/demo-be-jasb/target/site/jacoco/jacoco.xml
          flags: demo-be-jasb
          fail_ci_if_error: false

      - name: Upload coverage — organiclever-web
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/organiclever-web/coverage/lcov.info
          flags: organiclever-web
          fail_ci_if_error: false

      - name: Upload coverage — demo-be-exph
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/demo-be-exph/cover/lcov.info
          flags: demo-be-exph
          fail_ci_if_error: false

      - name: Upload coverage — demo-be-fsgi
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/demo-be-fsgi/coverage/altcov.info
          flags: demo-be-fsgi
          fail_ci_if_error: false

      - name: Upload coverage — demo-be-gogn
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/demo-be-gogn/cover_unit.out
          flags: demo-be-gogn
          fail_ci_if_error: false

      - name: Upload coverage — demo-be-pyfa
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/demo-be-pyfa/coverage/lcov.info
          flags: demo-be-pyfa
          fail_ci_if_error: false

      - name: Upload coverage — demo-be-rsax
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/demo-be-rsax/coverage/lcov.info
          flags: demo-be-rsax
          fail_ci_if_error: false

      - name: Upload coverage — demo-be-ktkt
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/demo-be-ktkt/build/reports/kover/report.xml
          flags: demo-be-ktkt
          fail_ci_if_error: false

      - name: Upload coverage — demo-be-javx
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/demo-be-javx/target/site/jacoco-integration/jacoco.xml
          flags: demo-be-javx
          fail_ci_if_error: false
