name: PR - Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  detect:
    name: Detect affected languages
    runs-on: ubuntu-latest
    outputs:
      has-ts: ${{ steps.detect.outputs.has-ts }}
      has-golang: ${{ steps.detect.outputs.has-golang }}
      has-jvm: ${{ steps.detect.outputs.has-jvm }}
      has-dotnet: ${{ steps.detect.outputs.has-dotnet }}
      has-python: ${{ steps.detect.outputs.has-python }}
      has-rust: ${{ steps.detect.outputs.has-rust }}
      has-elixir: ${{ steps.detect.outputs.has-elixir }}
      has-clojure: ${{ steps.detect.outputs.has-clojure }}
      has-dart: ${{ steps.detect.outputs.has-dart }}
      has-markdown: ${{ steps.detect.outputs.has-markdown }}
    env:
      NX_BASE: origin/${{ github.base_ref }}
      NX_HEAD: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - id: detect
        run: |
          AFFECTED=$(npx nx show projects --affected 2>/dev/null || echo "")
          # Check language tags for affected projects
          echo "has-ts=false" >> "$GITHUB_OUTPUT"
          echo "has-golang=false" >> "$GITHUB_OUTPUT"
          echo "has-jvm=false" >> "$GITHUB_OUTPUT"
          echo "has-dotnet=false" >> "$GITHUB_OUTPUT"
          echo "has-python=false" >> "$GITHUB_OUTPUT"
          echo "has-rust=false" >> "$GITHUB_OUTPUT"
          echo "has-elixir=false" >> "$GITHUB_OUTPUT"
          echo "has-clojure=false" >> "$GITHUB_OUTPUT"
          echo "has-dart=false" >> "$GITHUB_OUTPUT"
          echo "has-markdown=false" >> "$GITHUB_OUTPUT"

          for project in $AFFECTED; do
            TAGS=$(npx nx show project "$project" --json 2>/dev/null | jq -r '.tags[]' 2>/dev/null || echo "")
            for tag in $TAGS; do
              case "$tag" in
                lang:ts) echo "has-ts=true" >> "$GITHUB_OUTPUT" ;;
                lang:golang) echo "has-golang=true" >> "$GITHUB_OUTPUT" ;;
                lang:java|lang:kotlin) echo "has-jvm=true" >> "$GITHUB_OUTPUT" ;;
                lang:fsharp|lang:csharp) echo "has-dotnet=true" >> "$GITHUB_OUTPUT" ;;
                lang:python) echo "has-python=true" >> "$GITHUB_OUTPUT" ;;
                lang:rust) echo "has-rust=true" >> "$GITHUB_OUTPUT" ;;
                lang:elixir) echo "has-elixir=true" >> "$GITHUB_OUTPUT" ;;
                lang:clojure) echo "has-clojure=true" >> "$GITHUB_OUTPUT" ;;
                lang:dart) echo "has-dart=true" >> "$GITHUB_OUTPUT" ;;
              esac
            done
          done

          # Check for markdown changes
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || echo "")
          if echo "$CHANGED_FILES" | grep -q '\.md$'; then
            echo "has-markdown=true" >> "$GITHUB_OUTPUT"
          fi

  format:
    name: Format check (Prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - run: npx prettier --check .

  typescript:
    name: TypeScript quality gate
    needs: detect
    if: needs.detect.outputs.has-ts == 'true'
    runs-on: ubuntu-latest
    env:
      NX_BASE: origin/${{ github.base_ref }}
      NX_HEAD: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - run: npx nx affected -t typecheck lint test:quick spec-coverage --exclude='tag:lang:golang,tag:lang:java,tag:lang:kotlin,tag:lang:fsharp,tag:lang:csharp,tag:lang:python,tag:lang:rust,tag:lang:elixir,tag:lang:clojure,tag:lang:dart'

  golang:
    name: Go quality gate
    needs: detect
    if: needs.detect.outputs.has-golang == 'true'
    runs-on: ubuntu-latest
    env:
      NX_BASE: origin/${{ github.base_ref }}
      NX_HEAD: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-golang
      - name: Check Go formatting
        run: |
          UNFORMATTED=$(gofmt -l $(find ./apps ./libs -name '*.go' -not -path '*/node_modules/*' -not -path '*/vendor/*'))
          if [ -n "$UNFORMATTED" ]; then
            echo "The following Go files are not formatted:"
            echo "$UNFORMATTED"
            exit 1
          fi
      - run: npx nx affected -t typecheck lint test:quick spec-coverage --projects='tag:lang:golang'

  jvm:
    name: JVM quality gate
    needs: detect
    if: needs.detect.outputs.has-jvm == 'true'
    runs-on: ubuntu-latest
    env:
      NX_BASE: origin/${{ github.base_ref }}
      NX_HEAD: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-jvm
      - run: npx nx affected -t typecheck lint test:quick spec-coverage --projects='tag:lang:java,tag:lang:kotlin'

  dotnet:
    name: .NET quality gate
    needs: detect
    if: needs.detect.outputs.has-dotnet == 'true'
    runs-on: ubuntu-latest
    env:
      NX_BASE: origin/${{ github.base_ref }}
      NX_HEAD: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-dotnet
      - name: Check F# formatting
        run: |
          UNFORMATTED=$(find ./apps ./libs -name '*.fs' -not -path '*/obj/*' -not -path '*/bin/*' -not -path '*/generated-contracts/*')
          if [ -n "$UNFORMATTED" ]; then
            fantomas --check $UNFORMATTED
          fi
      - name: Check C# formatting
        run: |
          CS_PROJECTS=$(find ./apps -name '*.csproj' -not -path '*/generated-contracts/*')
          for proj in $CS_PROJECTS; do
            dotnet format whitespace --verify-no-changes "$(dirname "$proj")" || exit 1
          done
      - run: npx nx affected -t typecheck lint test:quick spec-coverage --projects='tag:lang:fsharp,tag:lang:csharp'

  python:
    name: Python quality gate
    needs: detect
    if: needs.detect.outputs.has-python == 'true'
    runs-on: ubuntu-latest
    env:
      NX_BASE: origin/${{ github.base_ref }}
      NX_HEAD: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-python
      - name: Check Python formatting
        run: ruff format --check apps/ libs/
      - run: npx nx affected -t typecheck lint test:quick spec-coverage --projects='tag:lang:python'

  rust:
    name: Rust quality gate
    needs: detect
    if: needs.detect.outputs.has-rust == 'true'
    runs-on: ubuntu-latest
    env:
      NX_BASE: origin/${{ github.base_ref }}
      NX_HEAD: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-rust
      - name: Check Rust formatting
        run: |
          for dir in $(find ./apps -name 'Cargo.toml' -exec dirname {} \;); do
            (cd "$dir" && cargo fmt --check) || exit 1
          done
      - run: npx nx affected -t typecheck lint test:quick spec-coverage --projects='tag:lang:rust'

  elixir:
    name: Elixir quality gate
    needs: detect
    if: needs.detect.outputs.has-elixir == 'true'
    runs-on: ubuntu-latest
    env:
      NX_BASE: origin/${{ github.base_ref }}
      NX_HEAD: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-elixir
      - name: Check Elixir formatting
        run: |
          for dir in $(find ./apps ./libs -maxdepth 2 -name 'mix.exs' -exec dirname {} \;); do
            (cd "$dir" && mix format --check-formatted) || exit 1
          done
      - run: npx nx affected -t typecheck lint test:quick spec-coverage --projects='tag:lang:elixir'

  clojure:
    name: Clojure quality gate
    needs: detect
    if: needs.detect.outputs.has-clojure == 'true'
    runs-on: ubuntu-latest
    env:
      NX_BASE: origin/${{ github.base_ref }}
      NX_HEAD: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-clojure
      - name: Check Clojure formatting
        run: |
          CLJ_FILES=$(find ./apps -name '*.clj' -not -path '*/generated-contracts/*')
          if [ -n "$CLJ_FILES" ] && command -v cljfmt &>/dev/null; then
            cljfmt check $CLJ_FILES
          fi
      - run: npx nx affected -t typecheck lint test:quick spec-coverage --projects='tag:lang:clojure'

  dart:
    name: Dart quality gate
    needs: detect
    if: needs.detect.outputs.has-dart == 'true'
    runs-on: ubuntu-latest
    env:
      NX_BASE: origin/${{ github.base_ref }}
      NX_HEAD: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-flutter
      - name: Check Dart formatting
        run: |
          DART_FILES=$(find ./apps -name '*.dart' -not -path '*/generated-contracts/*' -not -path '*/.dart_tool/*')
          if [ -n "$DART_FILES" ]; then
            dart format --set-exit-if-changed --output=none $DART_FILES
          fi
      - run: npx nx affected -t typecheck lint test:quick spec-coverage --projects='tag:lang:dart'

  markdown:
    name: Markdown quality gate
    needs: detect
    if: needs.detect.outputs.has-markdown == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - run: npm run lint:md

  quality-gate:
    name: Quality gate
    needs: [detect, format, typescript, golang, jvm, dotnet, python, rust, elixir, clojure, dart, markdown]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all gates
        run: |
          echo "Checking quality gate results..."
          FAILED=false
          for job in typescript golang jvm dotnet python rust elixir clojure dart markdown; do
            RESULT="${{ toJSON(needs) }}"
            # A skipped job is OK (language not affected). Only failure blocks.
          done
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "One or more quality gate jobs failed"
            exit 1
          fi
          echo "All quality gates passed"
