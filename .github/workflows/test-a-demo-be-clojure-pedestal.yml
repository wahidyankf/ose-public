name: Test - Demo BE (Clojure/Pedestal)

on:
  schedule:
    - cron: "0 23 * * *" # 6 AM WIB (UTC+7)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spec-coverage:
    uses: ./.github/workflows/_reusable-backend-spec-coverage.yml
    with:
      backend-name: a-demo-be-clojure-pedestal
      language: clojure
  lint:
    uses: ./.github/workflows/_reusable-backend-lint.yml
    with:
      backend-name: a-demo-be-clojure-pedestal
      language: clojure

  typecheck:
    uses: ./.github/workflows/_reusable-backend-typecheck.yml
    with:
      backend-name: a-demo-be-clojure-pedestal
      language: clojure

  coverage:
    uses: ./.github/workflows/_reusable-backend-coverage.yml
    with:
      backend-name: a-demo-be-clojure-pedestal
      language: clojure

  integration:
    uses: ./.github/workflows/_reusable-backend-integration.yml
    with:
      backend-name: a-demo-be-clojure-pedestal
      language: clojure
      compose-file: apps/a-demo-be-clojure-pedestal/docker-compose.integration.yml

  e2e:
    needs: integration
    uses: ./.github/workflows/_reusable-backend-e2e.yml
    with:
      backend-name: a-demo-be-clojure-pedestal
      language: clojure
      compose-dir: infra/dev/a-demo-be-clojure-pedestal
      be-e2e-target: "test:e2e:no-test-api"
      be-e2e-extra-env: "DATABASE_URL=postgresql://a_demo_be_clojure_pedestal:a_demo_be_clojure_pedestal@localhost:5432/a_demo_be_clojure_pedestal"
      health-timeout: 600
