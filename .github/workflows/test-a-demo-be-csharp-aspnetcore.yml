name: Test - Demo BE (C#/ASP.NET Core)

on:
  schedule:
    - cron: "0 23 * * *" # 6 AM WIB (UTC+7)
    - cron: "0 11 * * *" # 6 PM WIB (UTC+7)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/_reusable-backend-lint.yml
    with:
      backend-name: a-demo-be-csharp-aspnetcore
      setup-action: ./.github/actions/setup-dotnet

  typecheck:
    uses: ./.github/workflows/_reusable-backend-typecheck.yml
    with:
      backend-name: a-demo-be-csharp-aspnetcore
      setup-action: ./.github/actions/setup-dotnet

  coverage:
    uses: ./.github/workflows/_reusable-backend-coverage.yml
    with:
      backend-name: a-demo-be-csharp-aspnetcore
      setup-action: ./.github/actions/setup-dotnet

  spec-coverage:
    uses: ./.github/workflows/_reusable-backend-spec-coverage.yml
    with:
      backend-name: a-demo-be-csharp-aspnetcore
      setup-action: ./.github/actions/setup-dotnet

  integration:
    uses: ./.github/workflows/_reusable-backend-integration.yml
    with:
      backend-name: a-demo-be-csharp-aspnetcore
      setup-action: ./.github/actions/setup-dotnet
      compose-file: apps/a-demo-be-csharp-aspnetcore/docker-compose.integration.yml

  e2e:
    needs: integration
    uses: ./.github/workflows/_reusable-backend-e2e.yml
    with:
      backend-name: a-demo-be-csharp-aspnetcore
      setup-action: ./.github/actions/setup-dotnet
      compose-dir: infra/dev/a-demo-be-csharp-aspnetcore
      be-e2e-target: "test:e2e:no-test-api"
      be-e2e-extra-env: "DATABASE_URL=postgresql://a_demo_be_csharp_aspnetcore:a_demo_be_csharp_aspnetcore@localhost:5432/a_demo_be_csharp_aspnetcore"
