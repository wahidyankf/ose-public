name: Test - Demo BE (Java/Spring Boot)

on:
  schedule:
    - cron: "0 23 * * *" # 6 AM WIB (UTC+7)
    - cron: "0 11 * * *" # 6 PM WIB (UTC+7)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spec-coverage:
    uses: ./.github/workflows/_reusable-backend-spec-coverage.yml
    with:
      backend-name: a-demo-be-java-springboot
      language: jvm
  lint:
    uses: ./.github/workflows/_reusable-backend-lint.yml
    with:
      backend-name: a-demo-be-java-springboot
      language: jvm

  typecheck:
    uses: ./.github/workflows/_reusable-backend-typecheck.yml
    with:
      backend-name: a-demo-be-java-springboot
      language: jvm

  coverage:
    uses: ./.github/workflows/_reusable-backend-coverage.yml
    with:
      backend-name: a-demo-be-java-springboot
      language: jvm

  integration:
    uses: ./.github/workflows/_reusable-backend-integration.yml
    with:
      backend-name: a-demo-be-java-springboot
      language: jvm
      compose-file: apps/a-demo-be-java-springboot/docker-compose.integration.yml

  e2e:
    needs: integration
    uses: ./.github/workflows/_reusable-backend-e2e.yml
    with:
      backend-name: a-demo-be-java-springboot
      language: jvm
      compose-dir: infra/dev/a-demo-be-java-springboot
      be-e2e-target: "test:e2e:no-test-api"
      be-e2e-extra-env: "DATABASE_URL=postgresql://organiclever:organiclever@localhost:5432/demo_be"
