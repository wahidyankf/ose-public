name: Test - Demo BE (Java/Vert.x)

on:
  schedule:
    - cron: "0 23 * * *" # 6 AM WIB (UTC+7)
    - cron: "0 11 * * *" # 6 PM WIB (UTC+7)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/_reusable-backend-lint.yml
    with:
      backend-name: a-demo-be-java-vertx
      setup-action: ./.github/actions/setup-jvm

  typecheck:
    uses: ./.github/workflows/_reusable-backend-typecheck.yml
    with:
      backend-name: a-demo-be-java-vertx
      setup-action: ./.github/actions/setup-jvm

  coverage:
    uses: ./.github/workflows/_reusable-backend-coverage.yml
    with:
      backend-name: a-demo-be-java-vertx
      setup-action: ./.github/actions/setup-jvm

  spec-coverage:
    uses: ./.github/workflows/_reusable-backend-spec-coverage.yml
    with:
      backend-name: a-demo-be-java-vertx
      setup-action: ./.github/actions/setup-jvm

  integration:
    uses: ./.github/workflows/_reusable-backend-integration.yml
    with:
      backend-name: a-demo-be-java-vertx
      setup-action: ./.github/actions/setup-jvm
      compose-file: apps/a-demo-be-java-vertx/docker-compose.integration.yml

  e2e:
    needs: integration
    uses: ./.github/workflows/_reusable-backend-e2e.yml
    with:
      backend-name: a-demo-be-java-vertx
      setup-action: ./.github/actions/setup-jvm
      compose-dir: infra/dev/a-demo-be-java-vertx
      be-e2e-target: "test:e2e:no-test-api"
      be-e2e-extra-env: "DATABASE_URL=postgresql://a_demo_be_java_vertx:a_demo_be_java_vertx@localhost:5432/a_demo_be_java_vertx"
