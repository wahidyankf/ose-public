name: Test - Demo BE (TypeScript/Effect)

on:
  schedule:
    - cron: "0 23 * * *" # 6 AM WIB (UTC+7)
    - cron: "0 11 * * *" # 6 PM WIB (UTC+7)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/_reusable-backend-lint.yml
    with:
      backend-name: a-demo-be-ts-effect
      setup-action: ./.github/actions/setup-node

  typecheck:
    uses: ./.github/workflows/_reusable-backend-typecheck.yml
    with:
      backend-name: a-demo-be-ts-effect
      setup-action: ./.github/actions/setup-node

  coverage:
    uses: ./.github/workflows/_reusable-backend-coverage.yml
    with:
      backend-name: a-demo-be-ts-effect
      setup-action: ./.github/actions/setup-node

  spec-coverage:
    uses: ./.github/workflows/_reusable-backend-spec-coverage.yml
    with:
      backend-name: a-demo-be-ts-effect
      setup-action: ./.github/actions/setup-node

  integration:
    uses: ./.github/workflows/_reusable-backend-integration.yml
    with:
      backend-name: a-demo-be-ts-effect
      setup-action: ./.github/actions/setup-node
      compose-file: apps/a-demo-be-ts-effect/docker-compose.integration.yml

  e2e:
    needs: integration
    uses: ./.github/workflows/_reusable-backend-e2e.yml
    with:
      backend-name: a-demo-be-ts-effect
      setup-action: ./.github/actions/setup-node
      compose-dir: infra/dev/a-demo-be-ts-effect
      be-e2e-target: "test:e2e:no-test-api"
      be-e2e-extra-env: "DATABASE_URL=postgresql://a_demo_be_ts_effect:a_demo_be_ts_effect@localhost:5432/a_demo_be_ts_effect"
      docker-owned-dirs: "apps/a-demo-be-ts-effect/node_modules"
