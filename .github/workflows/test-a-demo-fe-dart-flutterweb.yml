name: Test - Demo FE (Dart/Flutter Web)

on:
  schedule:
    - cron: "0 23 * * *" # 6 AM WIB (UTC+7)
    - cron: "0 11 * * *" # 6 PM WIB (UTC+7)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-fe:
    uses: ./.github/workflows/_reusable-frontend-e2e.yml
    with:
      frontend-name: a-demo-fe-dart-flutterweb
      compose-dir: infra/dev/a-demo-fe-dart-flutterweb
      extra-setup-action: ./.github/actions/setup-flutter
      extra-codegen-targets: "a-demo-fe-ts-nextjs:codegen a-demo-fe-ts-tanstack-start:codegen"
      health-timeout: 600
