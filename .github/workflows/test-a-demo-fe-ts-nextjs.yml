name: Test - Demo FE (TypeScript/Next.js)

on:
  schedule:
    - cron: "0 23 * * *" # 6 AM WIB (UTC+7)
    - cron: "0 11 * * *" # 6 PM WIB (UTC+7)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spec-coverage:
    name: Spec coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-golang
      - run: npx nx run a-demo-fe-ts-nextjs:spec-coverage
  e2e-fe:
    uses: ./.github/workflows/_reusable-frontend-e2e.yml
    with:
      frontend-name: a-demo-fe-ts-nextjs
      compose-dir: infra/dev/a-demo-fe-ts-nextjs
      extra-codegen-targets: "a-demo-fe-ts-tanstack-start:codegen"
