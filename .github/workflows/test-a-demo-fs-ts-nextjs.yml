name: Test - Demo FS (TypeScript/Next.js)

on:
  schedule:
    - cron: "0 23 * * *" # 6 AM WIB (UTC+7)
    - cron: "0 11 * * *" # 6 PM WIB (UTC+7)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spec-coverage:
    name: Spec coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-golang
      - run: npx nx run a-demo-fs-ts-nextjs:spec-coverage
  integration:
    uses: ./.github/workflows/_reusable-backend-integration.yml
    with:
      backend-name: a-demo-fs-ts-nextjs
      language: typescript
      compose-file: apps/a-demo-fs-ts-nextjs/docker-compose.integration.yml

  e2e:
    needs: integration
    uses: ./.github/workflows/_reusable-backend-e2e.yml
    with:
      backend-name: a-demo-fs-ts-nextjs
      language: typescript
      compose-dir: infra/dev/a-demo-fs-ts-nextjs
      compose-file: infra/dev/a-demo-fs-ts-nextjs/docker-compose.yml
      frontend-port: 3401
      backend-port: 3401
      be-e2e-target: "test:e2e:no-test-api"
      be-e2e-extra-env: "DATABASE_URL=postgresql://demo_fs_nextjs:demo_fs_nextjs@localhost:5438/demo_fs_nextjs"
      skip-fe-e2e: true
