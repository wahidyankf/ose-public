name: Test and Deploy - AyoKoding Web

on:
  schedule:
    - cron: "0 23 * * *" # 6 AM WIB (UTC+7)
    - cron: "0 11 * * *" # 6 PM WIB (UTC+7)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-and-deploy:
    uses: ./.github/workflows/_reusable-test-and-deploy.yml
    with:
      app-name: ayokoding-web
      prod-branch: prod-ayokoding-web
      health-url: http://localhost:3101/api/trpc/meta.health
      health-timeout: 150
