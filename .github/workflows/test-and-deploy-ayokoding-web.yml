name: Test and Deploy - AyoKoding Web

on:
  schedule:
    - cron: "0 23 * * *" # 6 AM WIB (UTC+7)
    - cron: "0 11 * * *" # 6 PM WIB (UTC+7)
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Deploy even if no changes detected"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  unit:
    name: Unit tests + coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: apps/rhino-cli/go.sum

      - name: Install dependencies
        run: npm ci

      - name: Build rhino-cli (coverage validation)
        run: |
          cd apps/rhino-cli
          CGO_ENABLED=0 go build -o dist/rhino-cli main.go

      - name: Build ayokoding-cli (link validation)
        run: |
          cd apps/ayokoding-cli
          CGO_ENABLED=0 go build -o dist/ayokoding-cli main.go

      - name: Run test:quick
        run: npx nx run ayokoding-web:test:quick

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/ayokoding-web/coverage/lcov.info
          flags: ayokoding-web
          disable_search: true
          network_root_prefix: apps/ayokoding-web/
          fail_ci_if_error: false

  integration:
    name: Integration tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run test:integration
        run: npx nx run ayokoding-web:test:integration

  e2e:
    name: E2E tests (Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Build and start Docker
        run: |
          cd infra/dev/ayokoding-web
          docker compose up -d --build
          # Wait for health check
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3101/api/trpc/meta.health > /dev/null 2>&1; then
              echo "Health check passed"
              break
            fi
            echo "Waiting for app... ($i/30)"
            sleep 5
          done

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (BE E2E)
        run: cd apps/ayokoding-web-be-e2e && npx playwright install --with-deps chromium

      - name: Install Playwright browsers (FE E2E)
        run: cd apps/ayokoding-web-fe-e2e && npx playwright install --with-deps chromium

      - name: Run BE E2E tests
        run: npx nx run ayokoding-web-be-e2e:test:e2e
        env:
          BASE_URL: http://localhost:3101

      - name: Run FE E2E tests
        run: npx nx run ayokoding-web-fe-e2e:test:e2e
        env:
          BASE_URL: http://localhost:3101

      - name: Upload Playwright reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-reports
          path: |
            apps/ayokoding-web-be-e2e/playwright-report/
            apps/ayokoding-web-fe-e2e/playwright-report/
          retention-days: 7

      - name: Stop Docker
        if: always()
        run: |
          cd infra/dev/ayokoding-web
          docker compose down

  detect-changes:
    name: Detect changes in ayokoding-web
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes vs production branch
        id: check
        run: |
          git fetch origin prod-ayokoding-web 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/prod-ayokoding-web; then
            DIFF=$(git diff --name-only origin/prod-ayokoding-web HEAD -- apps/ayokoding-web/)
            if [ -n "$DIFF" ]; then
              echo "Changes detected:"
              echo "$DIFF"
              echo "has_changes=true" >> $GITHUB_OUTPUT
            else
              echo "No changes in apps/ayokoding-web/ since last deploy"
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Production branch does not exist — deploying for the first time"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    name: Deploy to production branch
    needs: [unit, integration, e2e, detect-changes]
    if: (needs.detect-changes.outputs.has_changes == 'true' || inputs.force_deploy == 'true') && needs.unit.result == 'success' && needs.integration.result == 'success' && needs.e2e.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to production branch
        run: git push --force origin HEAD:prod-ayokoding-web
