name: Test - Demo BE (Clojure/Pedestal)

on:
  schedule:
    - cron: "0 23 * * *" # 6 AM WIB (UTC+7)
    - cron: "0 11 * * *" # 6 PM WIB (UTC+7)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration-tests:
    name: Run integration tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run integration tests
        run: |
          docker compose -f apps/demo-be-clojure-pedestal/docker-compose.integration.yml down -v 2>/dev/null || true
          docker compose -f apps/demo-be-clojure-pedestal/docker-compose.integration.yml up --abort-on-container-exit --build

      - name: Teardown integration
        if: always()
        run: docker compose -f apps/demo-be-clojure-pedestal/docker-compose.integration.yml down -v

  e2e:
    name: Run E2E tests
    needs: integration-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start full stack (DB + backend + frontend)
        run: docker compose -f infra/dev/demo-be-clojure-pedestal/docker-compose.yml -f infra/dev/demo-be-clojure-pedestal/docker-compose.ci.yml up --build -d

      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 60); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' 'demo-be-clojure-pedestal' 2>/dev/null || echo "unknown")
            echo "[$i/60] Health: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Backend is healthy"
              break
            fi
            sleep 10
          done
          if [ "$STATUS" != "healthy" ]; then
            echo "Backend did not become healthy within 10 minutes"
            docker logs demo-be-clojure-pedestal
            exit 1
          fi

      - name: Wait for frontend to be ready
        run: |
          echo "Waiting for frontend to be ready on port 3301..."
          for i in $(seq 1 36); do
            if curl -sf http://localhost:3301 > /dev/null 2>&1; then
              echo "Frontend is ready"
              exit 0
            fi
            echo "[$i/36] Waiting..."
            sleep 10
          done
          echo "Frontend did not start within 6 minutes"
          docker compose -f infra/dev/demo-be-clojure-pedestal/docker-compose.yml -f infra/dev/demo-be-clojure-pedestal/docker-compose.ci.yml logs
          exit 1

      - name: Setup Volta
        uses: volta-cli/action@v4

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/demo-fe-e2e

      - name: Run BE E2E tests
        run: npx nx run demo-be-e2e:test:e2e:no-test-api
        env:
          BASE_URL: http://localhost:8201
          DATABASE_URL: postgresql://demo_be_clojure_pedestal:demo_be_clojure_pedestal@localhost:5432/demo_be_clojure_pedestal

      - name: Upload BE E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-demo-be-clojure-pedestal
          path: apps/demo-be-e2e/playwright-report/
          retention-days: 7

      - name: Run FE E2E tests
        run: npx nx run demo-fe-e2e:test:e2e
        env:
          BASE_URL: http://localhost:3301
          BACKEND_URL: http://localhost:8201

      - name: Upload FE E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-fe-e2e-clojure-pedestal
          path: apps/demo-fe-e2e/playwright-report/
          retention-days: 7

      - name: Dump backend and frontend logs
        if: always()
        run: |
          echo "=== Backend logs (last 200 lines) ==="
          docker logs demo-be-clojure-pedestal --tail 200 2>&1 || true
          echo "=== Frontend logs (last 100 lines) ==="
          docker logs demo-be-cjpd-ci-fe --tail 100 2>&1 || true

      - name: Stop full stack
        if: always()
        run: docker compose -f infra/dev/demo-be-clojure-pedestal/docker-compose.yml -f infra/dev/demo-be-clojure-pedestal/docker-compose.ci.yml down -v
