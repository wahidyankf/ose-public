name: Test Demo BE (F#/Giraffe)

on:
  schedule:
    - cron: "0 23 * * *" # 6 AM WIB (UTC+7)
    - cron: "0 11 * * *" # 6 PM WIB (UTC+7)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration-e2e-be:
    name: Run integration + E2E tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run integration tests
        run: |
          docker compose -f apps/demo-be-fsharp-giraffe/docker-compose.integration.yml down -v 2>/dev/null || true
          docker compose -f apps/demo-be-fsharp-giraffe/docker-compose.integration.yml up --abort-on-container-exit --build

      - name: Teardown integration
        if: always()
        run: docker compose -f apps/demo-be-fsharp-giraffe/docker-compose.integration.yml down -v

      - name: Start backend
        run: docker compose -f infra/dev/demo-be-fsharp-giraffe/docker-compose.yml -f infra/dev/demo-be-fsharp-giraffe/docker-compose.e2e.yml up --build -d demo-be-fsharp-giraffe

      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 36); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' 'demo-be-fsharp-giraffe' 2>/dev/null || echo "unknown")
            echo "[$i/36] Health: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 10
          done
          echo "Backend did not become healthy within 6 minutes"
          docker logs demo-be-fsharp-giraffe
          exit 1

      - name: Setup Volta
        uses: volta-cli/action@v4

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        run: npx nx run demo-be-e2e:test:e2e:no-test-api
        env:
          BASE_URL: http://localhost:8201
          DATABASE_URL: postgresql://demo_be_fsharp_giraffe:demo_be_fsharp_giraffe@localhost:5432/demo_be_fsharp_giraffe

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-demo-be-fsharp-giraffe
          path: apps/demo-be-e2e/playwright-report/
          retention-days: 7

      - name: Stop backend
        if: always()
        run: docker compose -f infra/dev/demo-be-fsharp-giraffe/docker-compose.yml down
