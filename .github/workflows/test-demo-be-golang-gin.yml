name: Test Demo Backend (Go/Gin)

on:
  push:
    branches: [main]
    paths:
      - "apps/demo-be-golang-gin/**"
      - "apps/demo-be-e2e/**"
      - "specs/apps/demo/be/**"
      - "infra/dev/demo-be-golang-gin/**"
  schedule:
    - cron: "0 23 * * *" # 6 AM WIB (UTC+7)
    - cron: "0 11 * * *" # 6 PM WIB (UTC+7)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration-tests:
    name: Run integration tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run integration tests
        run: |
          docker compose -f apps/demo-be-golang-gin/docker-compose.integration.yml down -v 2>/dev/null || true
          docker compose -f apps/demo-be-golang-gin/docker-compose.integration.yml up --abort-on-container-exit --build

      - name: Teardown integration
        if: always()
        run: docker compose -f apps/demo-be-golang-gin/docker-compose.integration.yml down -v

  e2e-tests:
    name: Run E2E tests (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start backend
        run: docker compose -f infra/dev/demo-be-golang-gin/docker-compose.yml -f infra/dev/demo-be-golang-gin/docker-compose.e2e.yml up --build -d demo-be-golang-gin

      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 24); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' 'demo-be-golang-gin' 2>/dev/null || echo "unknown")
            echo "[$i/24] Health: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 10
          done
          echo "Backend did not become healthy within 4 minutes"
          docker logs demo-be-golang-gin
          exit 1

      - name: Setup Volta
        uses: volta-cli/action@v4

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        run: npx nx run demo-be-e2e:test:e2e:shard
        env:
          BASE_URL: http://localhost:8201
          SHARD: ${{ matrix.shard }}/4

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-demo-be-golang-gin-shard-${{ matrix.shard }}
          path: apps/demo-be-e2e/playwright-report/
          retention-days: 7

      - name: Stop backend
        if: always()
        run: docker compose -f infra/dev/demo-be-golang-gin/docker-compose.yml down -v
