name: Test - Demo FE (TypeScript/Next.js)

on:
  schedule:
    - cron: "0 23 * * *" # 6 AM WIB (UTC+7)
    - cron: "0 11 * * *" # 6 PM WIB (UTC+7)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-fe:
    name: Run E2E tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Generate contract types
        run: |
          npm ci --ignore-scripts
          npx nx run demo-contracts:bundle
          npx nx run demo-fe-ts-nextjs:codegen
          npx nx run demo-fe-ts-tanstack-start:codegen

      - name: Start full stack (DB + backend + frontend)
        run: docker compose -f infra/dev/demo-fe-ts-nextjs/docker-compose.yml up --build -d

      - name: Wait for frontend to be ready
        run: |
          echo "Waiting for frontend to be ready on port 3301..."
          for i in $(seq 1 36); do
            if curl -sf http://localhost:3301 > /dev/null 2>&1; then
              echo "Frontend is ready"
              exit 0
            fi
            echo "[$i/36] Waiting..."
            sleep 10
          done
          echo "Frontend did not start within 6 minutes"
          docker compose -f infra/dev/demo-fe-ts-nextjs/docker-compose.yml logs
          exit 1

      - name: Setup Volta
        uses: volta-cli/action@v4

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/demo-fe-e2e

      - name: Run E2E tests
        run: npx nx run demo-fe-e2e:test:e2e
        env:
          BASE_URL: http://localhost:3301
          BACKEND_URL: http://localhost:8201

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-demo-fe-ts-nextjs
          path: apps/demo-fe-e2e/playwright-report/
          retention-days: 7

      - name: Stop full stack
        if: always()
        run: docker compose -f infra/dev/demo-fe-ts-nextjs/docker-compose.yml down -v
