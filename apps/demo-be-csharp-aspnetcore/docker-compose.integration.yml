services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: demo_be_csas_test
      POSTGRES_USER: demo_be_csas
      POSTGRES_PASSWORD: demo_be_csas
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo_be_csas -d demo_be_csas_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    ports:
      - "5432"
    tmpfs:
      - /var/lib/postgresql/data

  test-runner:
    build:
      context: ../..
      dockerfile: apps/demo-be-csharp-aspnetcore/Dockerfile.integration
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "Host=postgres;Port=5432;Database=demo_be_csas_test;Username=demo_be_csas;Password=demo_be_csas"
      APP_JWT_SECRET: "integration-test-secret-key-at-least-32-characters"
    volumes:
      - ../../specs:/specs:ro
