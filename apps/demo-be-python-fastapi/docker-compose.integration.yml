services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: demo_be_fastapi_test
      POSTGRES_USER: demo_be_fastapi
      POSTGRES_PASSWORD: demo_be_fastapi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo_be_fastapi -d demo_be_fastapi_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    ports:
      - "5432"
    tmpfs:
      - /var/lib/postgresql/data

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.integration
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://demo_be_fastapi:demo_be_fastapi@postgres:5432/demo_be_fastapi_test"
      GHERKIN_ROOT: "/specs/apps/demo/be/gherkin"
    volumes:
      - ../../specs:/specs:ro
