services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: demo_fs_nextjs_test
      POSTGRES_USER: demo_fs_nextjs_test
      POSTGRES_PASSWORD: demo_fs_nextjs_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo_fs_nextjs_test"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - test

  test-runner:
    build:
      context: ../..
      dockerfile: apps/demo-fs-ts-nextjs/Dockerfile.integration
    environment:
      DATABASE_URL: postgresql://demo_fs_nextjs_test:demo_fs_nextjs_test@db:5432/demo_fs_nextjs_test
      APP_JWT_SECRET: test-jwt-secret-at-least-32-chars-long!!
    depends_on:
      db:
        condition: service_healthy
    networks:
      - test

networks:
  test:
