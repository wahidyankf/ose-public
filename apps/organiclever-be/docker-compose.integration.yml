services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: organiclever_be_test
      POSTGRES_USER: organiclever_be
      POSTGRES_PASSWORD: organiclever_be
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U organiclever_be -d organiclever_be_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    ports:
      - "5432"
    tmpfs:
      - /var/lib/postgresql/data

  test-runner:
    build:
      context: ../..
      dockerfile: apps/organiclever-be/Dockerfile.integration
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "Host=postgres;Port=5432;Database=organiclever_be_test;Username=organiclever_be;Password=organiclever_be"
      APP_JWT_SECRET: "integration-test-secret-key-at-least-32-characters"
      APP_ENV: "test"
      GOOGLE_CLIENT_ID: "test"
      ENABLE_TEST_API: "true"
    volumes:
      - ../../specs:/specs:ro
