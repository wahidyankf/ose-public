coverage:
  status:
    project:
      default:
        target: 85%

# Exclude pure type-definition files — Go's coverage tool never
# instruments them (no executable statements), so they don't appear
# in cover.out. Without this, Codecov counts every line as uncovered
# and reports ~7% lower than go-test-coverage's statement coverage.
ignore:
  - "**/types.go"
  # demo-be-golang-gin infrastructure excluded from coverage (matches
  # grep -v filter in test:quick — Go has no built-in coverage exclusion)
  - "apps/demo-be-golang-gin/internal/store/gorm_store.go"
  - "apps/demo-be-golang-gin/internal/server/server.go"
  - "apps/demo-be-golang-gin/cmd/server/**"
  - "**/generated-contracts/**"

flags:
  rhino-cli:
    paths:
      - apps/rhino-cli/
    carryforward: true
  ayokoding-cli:
