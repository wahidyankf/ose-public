# CI overlay — production-equivalent mode + test-only API + Next.js frontend
# Usage:
#   BE E2E: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d demo-be-clojure-pedestal
#   FE E2E: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d

services:
  demo-be-clojure-pedestal:
    environment:
      - PEDESTAL_ENV=production
      - ENABLE_TEST_API=true

  demo-fe:
    build:
      context: ../../../apps/demo-fe-ts-nextjs
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://demo-be-clojure-pedestal:8201
    container_name: demo-be-cjpd-ci-fe
    ports:
      - "3301:3301"
    depends_on:
      demo-be-clojure-pedestal:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - demo-be-clojure-pedestal-network
