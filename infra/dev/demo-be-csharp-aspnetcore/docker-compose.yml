# Local Development Environment for Demo Backend (CSAS — C#/ASP.NET Core)
# Mutually exclusive with demo-be-java-springboot, demo-be-elixir-phoenix, demo-be-fsharp-giraffe, demo-be-golang-gin,
# demo-be-python-fastapi, demo-be-rust-axum, and demo-be-kotlin-ktor — all bind port 8201.
# Do not run multiple backend stacks simultaneously.

services:
  demo-be-csharp-aspnetcore-db:
    image: postgres:17-alpine
    container_name: demo-be-csharp-aspnetcore-db
    environment:
      POSTGRES_DB: demo_be_csharp_aspnetcore
      POSTGRES_USER: ${POSTGRES_USER:-demo_be_csharp_aspnetcore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo_be_csharp_aspnetcore}
    ports:
      - "5432:5432"
    volumes:
      - demo-be-csharp-aspnetcore-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-demo_be_csharp_aspnetcore} -d demo_be_csharp_aspnetcore"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - demo-be-csharp-aspnetcore-network

  demo-be-csharp-aspnetcore:
    build:
      context: .
      dockerfile: Dockerfile.be.dev
    container_name: demo-be-csharp-aspnetcore
    working_dir: /workspace

    # Mount app source and shared Gherkin specs.
    volumes:
      - ../../../apps/demo-be-csharp-aspnetcore:/workspace:rw
      - ../../../specs/apps/demo/be/gherkin:/specs/apps/demo/be/gherkin:ro

    ports:
      - "8201:8201"

    depends_on:
      demo-be-csharp-aspnetcore-db:
        condition: service_healthy

    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8201
      - DATABASE_URL=Host=demo-be-csharp-aspnetcore-db;Port=5432;Database=demo_be_csharp_aspnetcore;Username=demo_be_csharp_aspnetcore;Password=demo_be_csharp_aspnetcore
      - APP_JWT_SECRET=${APP_JWT_SECRET:-change-me-in-dev-only-not-for-production}

    command: dotnet run --project src/DemoBeCsas/DemoBeCsas.csproj

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8201/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

    restart: unless-stopped
    networks:
      - demo-be-csharp-aspnetcore-network

networks:
  demo-be-csharp-aspnetcore-network:
    driver: bridge
    name: demo-be-csharp-aspnetcore-network

volumes:
  demo-be-csharp-aspnetcore-db-data:
