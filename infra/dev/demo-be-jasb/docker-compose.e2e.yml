# E2E override for demo-be-e2e tests
# Use with: docker compose -f docker-compose.yml -f docker-compose.e2e.yml
#
# Overrides management.endpoint.health.show-details to `when-authorized`
# (OS env vars take higher precedence than profile-specific application-dev.yml).
# This makes the "Anonymous health check does not expose component details"
# scenario behave as it would in production / when-authorized configuration.
services:
  demo-be-jasb:
    environment:
      - MANAGEMENT_ENDPOINT_HEALTH_SHOWDETAILS=when-authorized
