# CI overlay — production-equivalent mode + test-only API + Next.js frontend
# Usage:
#   BE E2E: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d demo-be-java-springboot
#   FE E2E: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d

services:
  demo-be-java-springboot:
    environment:
      - MANAGEMENT_ENDPOINT_HEALTH_SHOWDETAILS=when-authorized
      - ENABLE_TEST_API=true

  demo-fe:
    build:
      context: ../../../apps/demo-fe-ts-nextjs
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://demo-be-java-springboot:8201
    container_name: demo-be-jasb-ci-fe
    ports:
      - "3301:3301"
    depends_on:
      demo-be-java-springboot:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - demo-be-network
