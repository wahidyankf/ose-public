# Local Development Environment for Demo Backend (JAVX — Java/Vert.x)
# Mutually exclusive with other demo-be backends — all bind port 8201.
# Do not run multiple backend stacks simultaneously.

services:
  demo-be-java-vertx-db:
    image: postgres:17-alpine
    container_name: demo-be-java-vertx-db
    environment:
      POSTGRES_DB: demo_be_java_vertx
      POSTGRES_USER: ${POSTGRES_USER:-demo_be_java_vertx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo_be_java_vertx}
    ports:
      - "5432:5432"
    volumes:
      - demo-be-java-vertx-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-demo_be_java_vertx} -d demo_be_java_vertx"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - demo-be-java-vertx-network

  demo-be-java-vertx:
    build:
      context: .
      dockerfile: Dockerfile.be.dev
    container_name: demo-be-java-vertx
    working_dir: /workspace

    # Mount app source and shared Gherkin specs.
    volumes:
      - ../../../apps/demo-be-java-vertx:/workspace:rw
      - ../../../specs/apps/demo/be/gherkin:/specs/apps/demo/be/gherkin:ro

    ports:
      - "8201:8201"

    depends_on:
      demo-be-java-vertx-db:
        condition: service_healthy

    environment:
      - PORT=8201
      - DATABASE_URL=postgresql://demo_be_java_vertx:demo_be_java_vertx@demo-be-java-vertx-db:5432/demo_be_java_vertx
      - APP_JWT_SECRET=${APP_JWT_SECRET:-change-me-in-dev-only-not-for-production}

    command: mvn compile exec:java

    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8201/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 240s

    restart: unless-stopped
    networks:
      - demo-be-java-vertx-network

networks:
  demo-be-java-vertx-network:
    driver: bridge
    name: demo-be-java-vertx-network

volumes:
  demo-be-java-vertx-db-data:
