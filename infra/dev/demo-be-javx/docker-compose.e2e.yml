# E2E override for demo-be-e2e Playwright tests
# Use with: docker compose -f docker-compose.yml -f docker-compose.e2e.yml
#
# Keeps the stack in production-equivalent mode during E2E.
services:
  demo-be-javx:
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://demo_be_javx:demo_be_javx@demo-be-javx-db:5432/demo_be_javx
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8201/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 600s
