# Local Development Environment for Demo Backend (JAVX — Java/Vert.x)
# Mutually exclusive with other demo-be backends — all bind port 8201.
# Do not run multiple backend stacks simultaneously.

services:
  demo-be-javx-db:
    image: postgres:17-alpine
    container_name: demo-be-javx-db
    environment:
      POSTGRES_DB: demo_be_javx
      POSTGRES_USER: ${POSTGRES_USER:-demo_be_javx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo_be_javx}
    ports:
      - "5432:5432"
    volumes:
      - demo-be-javx-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-demo_be_javx} -d demo_be_javx"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - demo-be-javx-network

  demo-be-javx:
    build:
      context: .
      dockerfile: Dockerfile.be.dev
    container_name: demo-be-javx
    working_dir: /workspace

    # Mount app source and shared Gherkin specs.
    volumes:
      - ../../../apps/demo-be-javx:/workspace:rw
      - ../../../specs/apps/demo-be/gherkin:/specs/apps/demo-be/gherkin:ro

    ports:
      - "8201:8201"

    depends_on:
      demo-be-javx-db:
        condition: service_healthy

    environment:
      - PORT=8201
      - DATABASE_URL=postgresql://demo_be_javx:demo_be_javx@demo-be-javx-db:5432/demo_be_javx
      - APP_JWT_SECRET=${APP_JWT_SECRET:-change-me-in-dev-only-not-for-production}

    command: mvn compile exec:java

    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8201/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 240s

    restart: unless-stopped
    networks:
      - demo-be-javx-network

networks:
  demo-be-javx-network:
    driver: bridge
    name: demo-be-javx-network

volumes:
  demo-be-javx-db-data:
