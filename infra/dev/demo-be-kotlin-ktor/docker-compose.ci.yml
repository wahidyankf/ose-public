# CI overlay — production-equivalent mode + test-only API + Next.js frontend
# Usage:
#   BE E2E: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d demo-be-kotlin-ktor
#   FE E2E: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d

services:
  demo-be-kotlin-ktor:
    environment:
      - APP_ENV=production
      - ENABLE_TEST_API=true

  demo-fe:
    build:
      context: ../../..
      dockerfile: apps/demo-fe-ts-nextjs/Dockerfile
      args:
        BACKEND_URL: http://demo-be-kotlin-ktor:8201
    container_name: demo-be-ktkt-ci-fe
    ports:
      - "3301:3301"
    depends_on:
      demo-be-kotlin-ktor:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - demo-be-kotlin-ktor-network
