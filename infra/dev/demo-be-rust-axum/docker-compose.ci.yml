# CI overlay — production-equivalent mode + test-only API + Next.js frontend
# Usage:
#   BE E2E: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d demo-be-rust-axum
#   FE E2E: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d

services:
  demo-be-rust-axum:
    environment:
      - RUST_LOG=warn
      - DATABASE_URL=postgresql://demo_be_rust_axum:demo_be_rust_axum@demo-be-rust-axum-db:5432/demo_be_rust_axum
      - ENABLE_TEST_API=true

  demo-fe:
    build:
      context: ../../../apps/demo-fe-ts-nextjs
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://demo-be-rust-axum:8201
    container_name: demo-be-rsax-ci-fe
    ports:
      - "3301:3301"
    depends_on:
      demo-be-rust-axum:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - demo-be-rust-axum-network
