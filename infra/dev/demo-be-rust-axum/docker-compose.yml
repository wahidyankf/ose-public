# Local Development Environment for Demo Backend (RSAX — Rust/Axum)
# Mutually exclusive with other demo-be backends — all bind port 8201.
# Do not run multiple backend stacks simultaneously.

services:
  demo-be-rust-axum-db:
    image: postgres:17-alpine
    container_name: demo-be-rust-axum-db
    environment:
      POSTGRES_DB: demo_be_rust_axum
      POSTGRES_USER: ${POSTGRES_USER:-demo_be_rust_axum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo_be_rust_axum}
    ports:
      - "5432:5432"
    volumes:
      - demo-be-rust-axum-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-demo_be_rust_axum} -d demo_be_rust_axum"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - demo-be-rust-axum-network

  demo-be-rust-axum:
    build:
      context: .
      dockerfile: Dockerfile.be.dev
    container_name: demo-be-rust-axum
    working_dir: /workspace

    # Mount app source and shared Gherkin specs.
    volumes:
      - ../../../apps/demo-be-rust-axum:/workspace:rw
      - ../../../specs/apps/demo/be/gherkin:/specs/apps/demo/be/gherkin:ro

    ports:
      - "8201:8201"

    depends_on:
      demo-be-rust-axum-db:
        condition: service_healthy

    environment:
      - PORT=8201
      - "DATABASE_URL=sqlite::memory:"
      - APP_JWT_SECRET=${APP_JWT_SECRET:-dev-jwt-secret-that-is-32-chars-long!}

    command: cargo run

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8201/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

    restart: unless-stopped
    networks:
      - demo-be-rust-axum-network

networks:
  demo-be-rust-axum-network:
    driver: bridge
    name: demo-be-rust-axum-network

volumes:
  demo-be-rust-axum-db-data:
