# Local Development Environment for Demo Frontend
# Stack: Frontend + Backend (Go/Gin) + Database (PostgreSQL)

services:
  demo-be-db:
    image: postgres:17-alpine
    container_name: demo-fe-tsnx-db
    environment:
      POSTGRES_DB: demo_be
      POSTGRES_USER: ${POSTGRES_USER:-organiclever}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-organiclever}
    ports:
      - "5432:5432"
    volumes:
      - demo-fe-tsnx-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-organiclever} -d demo_be"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - demo-fe-tsnx-network

  demo-be:
    build:
      context: ../../../apps/demo-be-golang-gin
      dockerfile: Dockerfile
    container_name: demo-fe-tsnx-be
    ports:
      - "8201:8201"
    depends_on:
      demo-be-db:
        condition: service_healthy
    environment:
      - PORT=8201
      - DATABASE_URL=postgresql://${POSTGRES_USER:-organiclever}:${POSTGRES_PASSWORD:-organiclever}@demo-be-db:5432/demo_be
      - APP_JWT_SECRET=${APP_JWT_SECRET:-change-me-in-dev-only-not-for-production}
      - ENABLE_TEST_API=true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8201/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - demo-fe-tsnx-network

  demo-fe:
    build:
      context: ../../../apps/demo-fe-ts-nextjs
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://demo-be:8201
    container_name: demo-fe-tsnx
    ports:
      - "3301:3301"
    depends_on:
      demo-be:
        condition: service_healthy
    environment:
      - BACKEND_URL=http://demo-be:8201
    restart: unless-stopped
    networks:
      - demo-fe-tsnx-network

networks:
  demo-fe-tsnx-network:
    driver: bridge

volumes:
  demo-fe-tsnx-db-data:
