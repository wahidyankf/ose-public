services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: demo_fs_nextjs
      POSTGRES_USER: demo_fs_nextjs
      POSTGRES_PASSWORD: demo_fs_nextjs
    ports:
      - "5438:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo_fs_nextjs"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - demo-fs

  app:
    build:
      context: ../../../apps/demo-fs-ts-nextjs
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://demo_fs_nextjs:demo_fs_nextjs@db:5432/demo_fs_nextjs
      APP_JWT_SECRET: dev-jwt-secret-at-least-32-chars-long!!
      ENABLE_TEST_API: "true"
    ports:
      - "3401:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - demo-fs

volumes:
  pgdata:

networks:
  demo-fs:
