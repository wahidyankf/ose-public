services:
  organiclever-be:
    build:
      context: .
      dockerfile: Dockerfile.be.dev
    ports:
      - "8202:8202"
    environment:
      ASPNETCORE_URLS: "http://+:8202"
    volumes:
      - ../../../apps/organiclever-be:/workspace:rw
      - ../../../specs/apps/organiclever/be/gherkin:/specs/apps/organiclever/be/gherkin:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8202/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  organiclever-web:
    build:
      context: ../../..
      dockerfile: apps/organiclever-web/Dockerfile
      args:
        ORGANICLEVER_BE_URL: http://organiclever-be:8202
    ports:
      - "3200:3200"
    environment:
      ORGANICLEVER_BE_URL: "http://organiclever-be:8202"
    depends_on:
      organiclever-be:
        condition: service_healthy
