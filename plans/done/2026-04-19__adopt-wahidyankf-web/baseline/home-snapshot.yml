                - generic [ref=e40]:
                    - heading "About Me" [level=2] [ref=e41]
                    - paragraph [ref=e42]: Results-oriented software engineering leader with over 4 years of team management and strategic experience in Sharia-compliant fintech and tech startup environments. Proven expertise in delivering transformative projects, including a core banking migration at Hijra Bank (95% reduction in operational costs, equivalent to 30% of monthly revenue), adopting AI tooling to Hijra Bank's engineering team (60% productivity increase for around 3.75% monthly salary budget increase) and driving 50% of financing disbursements through Supply Chain Financing at Alami P2P Lending. Passionate about Islamic finance innovation, technical excellence, and team growth, I thrive on empowering teams to deliver scalable, halal solutions.
                    - paragraph [ref=e43]: As Head of Engineering at Hijra Bank, I lead the product, platform, and data engineering team to ensure it delivers business impact while maintaining 100% compliance with OJK regulations. I dedicated my career to halal and Sharia-compliant and neutral engineering roles (e.g., platform or warehouse systems) that align with Islamic principles. I am a polyglot fluent in Bahasa Indonesia and English, with knowledge of German and Arabic, bringing a global perspective shaped by my overseas experience.
                    - paragraph [ref=e44]: I contribute to the tech community through my blog and YouTube channel, AyoKoding (ayokoding.com), where I share insights on software engineering and Islamic fintech, and seek to leverage my leadership and technical expertise to build innovative, Sharia-compliant, or neutral solutions that create a lasting impact.
