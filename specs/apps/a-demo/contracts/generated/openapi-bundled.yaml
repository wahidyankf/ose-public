openapi: 3.1.0
info:
  title: OrganicLever Demo API
  description: REST API contract for the OrganicLever expense tracker demo application
  version: 1.0.0
  contact:
    name: Open Sharia Enterprise
    url: https://github.com/wahidyankf/open-sharia-enterprise
servers:
  - url: http://localhost:8080
    description: Default backend (Go/Gin)
  - url: http://localhost:8201
    description: Java Spring Boot backend
tags:
  - name: Health
    description: Service health checks
  - name: Authentication
    description: User authentication and token management
  - name: Users
    description: User profile management
  - name: Expenses
    description: Expense and income record management
  - name: Attachments
    description: File attachments on expenses
  - name: Reports
    description: Financial reporting
  - name: Admin
    description: Administrative user management
  - name: Tokens
    description: JWT token inspection and JWKS
  - name: Test Support
    description: Test-only endpoints for database reset and role promotion
    x-test-only: true
paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/auth/register:
    post:
      operationId: register
      summary: Register a new user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Username or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/login:
    post:
      operationId: login
      summary: Authenticate with credentials
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/refresh:
    post:
      operationId: refreshToken
      summary: Refresh access token
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/logout:
    post:
      operationId: logout
      summary: Logout current session
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out successfully
  /api/v1/auth/logout-all:
    post:
      operationId: logoutAll
      summary: Logout all sessions
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All sessions logged out
  /api/v1/users/me:
    get:
      operationId: getCurrentUser
      summary: Get current user profile
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      operationId: updateProfile
      summary: Update current user profile
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/users/me/password:
    post:
      operationId: changePassword
      summary: Change current user password
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed successfully
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated or wrong old password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/users/me/deactivate:
    post:
      operationId: deactivateAccount
      summary: Deactivate current user account
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Account deactivated
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/expenses:
    post:
      operationId: createExpense
      summary: Create a new expense or income record
      tags:
        - Expenses
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExpenseRequest'
      responses:
        '201':
          description: Expense created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expense'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      operationId: listExpenses
      summary: List expenses with pagination
      tags:
        - Expenses
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: currency
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum:
              - income
              - expense
      responses:
        '200':
          description: Paginated expense list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseListResponse'
  /api/v1/expenses/{id}:
    get:
      operationId: getExpense
      summary: Get expense by ID
      tags:
        - Expenses
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Expense details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expense'
        '404':
          description: Expense not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: updateExpense
      summary: Update expense by ID
      tags:
        - Expenses
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExpenseRequest'
      responses:
        '200':
          description: Expense updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expense'
        '404':
          description: Expense not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteExpense
      summary: Delete expense by ID
      tags:
        - Expenses
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Expense deleted
        '404':
          description: Expense not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/expenses/summary:
    get:
      operationId: getExpenseSummary
      summary: Get expense summary grouped by currency
      tags:
        - Expenses
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Expense summary by currency
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExpenseSummary'
  /api/v1/expenses/{id}/attachments:
    post:
      operationId: uploadAttachment
      summary: Upload attachment to expense
      tags:
        - Attachments
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Attachment uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
        '413':
          description: File too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported file type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      operationId: listAttachments
      summary: List attachments for expense
      tags:
        - Attachments
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attachment'
  /api/v1/expenses/{id}/attachments/{aid}:
    delete:
      operationId: deleteAttachment
      summary: Delete attachment
      tags:
        - Attachments
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: aid
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Attachment deleted
        '404':
          description: Attachment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/reports/pl:
    get:
      operationId: getPLReport
      summary: Get profit and loss report
      tags:
        - Reports
      security:
        - bearerAuth: []
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: currency
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Profit and loss report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PLReport'
  /api/v1/admin/users:
    get:
      operationId: listUsers
      summary: List all users (admin)
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '403':
          description: Not authorized (not admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/admin/users/{id}/disable:
    post:
      operationId: disableUser
      summary: Disable a user account
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisableRequest'
      responses:
        '200':
          description: User disabled
        '403':
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/admin/users/{id}/enable:
    post:
      operationId: enableUser
      summary: Enable a disabled user account
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User enabled
  /api/v1/admin/users/{id}/unlock:
    post:
      operationId: unlockUser
      summary: Unlock a locked user account
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User unlocked
  /api/v1/admin/users/{id}/force-password-reset:
    post:
      operationId: forcePasswordReset
      summary: Force password reset for a user
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Password reset forced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetResponse'
  /api/v1/tokens/claims:
    get:
      operationId: getTokenClaims
      summary: Get current token claims
      tags:
        - Tokens
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token claims
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenClaims'
  /.well-known/jwks.json:
    get:
      operationId: getJwks
      summary: Get JSON Web Key Set
      tags:
        - Tokens
      responses:
        '200':
          description: JWKS response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwksResponse'
  /api/v1/test/reset-db:
    post:
      operationId: resetDatabase
      summary: Reset database to clean state
      tags:
        - Test Support
      x-test-only: true
      responses:
        '200':
          description: Database reset successfully
  /api/v1/test/promote-admin:
    post:
      operationId: promoteToAdmin
      summary: Promote a user to admin role
      tags:
        - Test Support
      x-test-only: true
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User promoted to admin
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      description: Credentials for user authentication
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 5
          maxLength: 50
        password:
          type: string
          minLength: 8
          maxLength: 128
    RegisterRequest:
      type: object
      description: New user registration payload
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 5
          maxLength: 50
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128
    RefreshRequest:
      type: object
      description: Token refresh request
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
    AuthTokens:
      type: object
      description: Authentication token pair returned on login or refresh
      required:
        - accessToken
        - refreshToken
        - tokenType
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          example: Bearer
    User:
      type: object
      description: User account details
      required:
        - id
        - username
        - email
        - displayName
        - status
        - roles
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
            - DISABLED
            - LOCKED
        roles:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UpdateProfileRequest:
      type: object
      description: Update user display name
      required:
        - displayName
      properties:
        displayName:
          type: string
    ChangePasswordRequest:
      type: object
      description: Change user password
      required:
        - oldPassword
        - newPassword
      properties:
        oldPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
          maxLength: 128
    Expense:
      type: object
      description: An expense or income record
      required:
        - id
        - amount
        - currency
        - category
        - description
        - date
        - type
        - userId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        amount:
          type: string
          description: Decimal amount as string for precision
        currency:
          type: string
        category:
          type: string
        description:
          type: string
        date:
          type: string
          format: date
        type:
          type: string
          enum:
            - income
            - expense
        quantity:
          type: number
          nullable: true
        unit:
          type: string
          nullable: true
        userId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateExpenseRequest:
      type: object
      description: Create a new expense or income record
      required:
        - amount
        - currency
        - category
        - description
        - date
        - type
      properties:
        amount:
          type: string
        currency:
          type: string
        category:
          type: string
        description:
          type: string
        date:
          type: string
          format: date
        type:
          type: string
          enum:
            - income
            - expense
        quantity:
          type: number
          nullable: true
        unit:
          type: string
          nullable: true
    UpdateExpenseRequest:
      type: object
      description: Update an existing expense or income record (all fields optional)
      properties:
        amount:
          type: string
        currency:
          type: string
        category:
          type: string
        description:
          type: string
        date:
          type: string
          format: date
        type:
          type: string
          enum:
            - income
            - expense
        quantity:
          type: number
          nullable: true
        unit:
          type: string
          nullable: true
    ExpenseListResponse:
      type: object
      description: Paginated list of expenses
      required:
        - content
        - totalElements
        - totalPages
        - page
        - size
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Expense'
        totalElements:
          type: integer
        totalPages:
          type: integer
        page:
          type: integer
        size:
          type: integer
    CategoryBreakdown:
      type: object
      description: Breakdown of totals by category
      required:
        - category
        - type
        - total
      properties:
        category:
          type: string
        type:
          type: string
        total:
          type: string
    ExpenseSummary:
      type: object
      description: Summary of expenses by currency
      required:
        - currency
        - totalIncome
        - totalExpense
        - net
        - categories
      properties:
        currency:
          type: string
        totalIncome:
          type: string
        totalExpense:
          type: string
        net:
          type: string
        categories:
          type: array
          items:
            $ref: '#/components/schemas/CategoryBreakdown'
    PLReport:
      type: object
      description: Profit and loss report for a date range
      required:
        - startDate
        - endDate
        - currency
        - totalIncome
        - totalExpense
        - net
        - incomeBreakdown
        - expenseBreakdown
      properties:
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        currency:
          type: string
        totalIncome:
          type: string
        totalExpense:
          type: string
        net:
          type: string
        incomeBreakdown:
          type: array
          items:
            $ref: '#/components/schemas/CategoryBreakdown'
        expenseBreakdown:
          type: array
          items:
            $ref: '#/components/schemas/CategoryBreakdown'
    Attachment:
      type: object
      description: File attachment metadata
      required:
        - id
        - filename
        - contentType
        - size
        - createdAt
      properties:
        id:
          type: string
        filename:
          type: string
        contentType:
          type: string
        size:
          type: integer
        createdAt:
          type: string
          format: date-time
    TokenClaims:
      type: object
      description: Decoded JWT token claims
      required:
        - sub
        - iss
        - exp
        - iat
        - roles
      properties:
        sub:
          type: string
        iss:
          type: string
        exp:
          type: integer
        iat:
          type: integer
        roles:
          type: array
          items:
            type: string
    JwkKey:
      type: object
      description: JSON Web Key
      required:
        - kty
        - kid
        - use
        - 'n'
        - e
      properties:
        kty:
          type: string
        kid:
          type: string
        use:
          type: string
        'n':
          type: string
        e:
          type: string
    JwksResponse:
      type: object
      description: JSON Web Key Set
      required:
        - keys
      properties:
        keys:
          type: array
          items:
            $ref: '#/components/schemas/JwkKey'
    DisableRequest:
      type: object
      description: Request to disable a user account
      required:
        - reason
      properties:
        reason:
          type: string
    PasswordResetResponse:
      type: object
      description: Response containing a temporary password reset token
      required:
        - token
      properties:
        token:
          type: string
    UserListResponse:
      type: object
      description: Paginated list of users (admin view)
      required:
        - content
        - totalElements
        - totalPages
        - page
        - size
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/User'
        totalElements:
          type: integer
        totalPages:
          type: integer
        page:
          type: integer
        size:
          type: integer
    ErrorResponse:
      type: object
      description: Standardized error response
      required:
        - error
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    HealthResponse:
      type: object
      description: Health check response
      required:
        - status
      properties:
        status:
          type: string
          example: ok
