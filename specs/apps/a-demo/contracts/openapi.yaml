openapi: 3.1.0
info:
  title: OrganicLever Demo API
  description: REST API contract for the OrganicLever expense tracker demo application
  version: 1.0.0
  contact:
    name: Open Sharia Enterprise
    url: https://github.com/wahidyankf/ose-public

servers:
  - url: http://localhost:8080
    description: Default backend (Go/Gin)
  - url: http://localhost:8201
    description: Java Spring Boot backend

tags:
  - name: Health
    description: Service health checks
  - name: Authentication
    description: User authentication and token management
  - name: Users
    description: User profile management
  - name: Expenses
    description: Expense and income record management
  - name: Attachments
    description: File attachments on expenses
  - name: Reports
    description: Financial reporting
  - name: Admin
    description: Administrative user management
  - name: Tokens
    description: JWT token inspection and JWKS
  - name: Test Support
    description: Test-only endpoints for database reset and role promotion
    x-test-only: true

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Auth
    LoginRequest:
      $ref: "./schemas/auth.yaml#/LoginRequest"
    RegisterRequest:
      $ref: "./schemas/auth.yaml#/RegisterRequest"
    RefreshRequest:
      $ref: "./schemas/auth.yaml#/RefreshRequest"
    AuthTokens:
      $ref: "./schemas/auth.yaml#/AuthTokens"

    # User
    User:
      $ref: "./schemas/user.yaml#/User"
    UpdateProfileRequest:
      $ref: "./schemas/user.yaml#/UpdateProfileRequest"
    ChangePasswordRequest:
      $ref: "./schemas/user.yaml#/ChangePasswordRequest"

    # Expense
    Expense:
      $ref: "./schemas/expense.yaml#/Expense"
    CreateExpenseRequest:
      $ref: "./schemas/expense.yaml#/CreateExpenseRequest"
    UpdateExpenseRequest:
      $ref: "./schemas/expense.yaml#/UpdateExpenseRequest"
    ExpenseListResponse:
      $ref: "./schemas/expense-list.yaml#/ExpenseListResponse"

    # Report
    CategoryBreakdown:
      $ref: "./schemas/report.yaml#/CategoryBreakdown"
    ExpenseSummary:
      $ref: "./schemas/report.yaml#/ExpenseSummary"
    PLReport:
      $ref: "./schemas/report.yaml#/PLReport"

    # Attachment
    Attachment:
      $ref: "./schemas/attachment.yaml#/Attachment"

    # Token
    TokenClaims:
      $ref: "./schemas/token.yaml#/TokenClaims"
    JwkKey:
      $ref: "./schemas/token.yaml#/JwkKey"
    JwksResponse:
      $ref: "./schemas/token.yaml#/JwksResponse"

    # Admin
    DisableRequest:
      $ref: "./schemas/admin.yaml#/DisableRequest"
    PasswordResetResponse:
      $ref: "./schemas/admin.yaml#/PasswordResetResponse"
    UserListResponse:
      $ref: "./schemas/admin.yaml#/UserListResponse"

    # Common
    ErrorResponse:
      $ref: "./schemas/error.yaml#/ErrorResponse"
    HealthResponse:
      $ref: "./schemas/health.yaml#/HealthResponse"

paths:
  # Health
  /health:
    $ref: "./paths/health.yaml#/~1health"

  # Authentication
  /api/v1/auth/register:
    $ref: "./paths/auth.yaml#/~1api~1v1~1auth~1register"
  /api/v1/auth/login:
    $ref: "./paths/auth.yaml#/~1api~1v1~1auth~1login"
  /api/v1/auth/refresh:
    $ref: "./paths/auth.yaml#/~1api~1v1~1auth~1refresh"
  /api/v1/auth/logout:
    $ref: "./paths/auth.yaml#/~1api~1v1~1auth~1logout"
  /api/v1/auth/logout-all:
    $ref: "./paths/auth.yaml#/~1api~1v1~1auth~1logout-all"

  # Users
  /api/v1/users/me:
    $ref: "./paths/users.yaml#/~1api~1v1~1users~1me"
  /api/v1/users/me/password:
    $ref: "./paths/users.yaml#/~1api~1v1~1users~1me~1password"
  /api/v1/users/me/deactivate:
    $ref: "./paths/users.yaml#/~1api~1v1~1users~1me~1deactivate"

  # Expenses
  /api/v1/expenses:
    $ref: "./paths/expenses.yaml#/~1api~1v1~1expenses"
  /api/v1/expenses/{id}:
    $ref: "./paths/expenses.yaml#/~1api~1v1~1expenses~1{id}"
  /api/v1/expenses/summary:
    $ref: "./paths/expenses.yaml#/~1api~1v1~1expenses~1summary"

  # Attachments
  /api/v1/expenses/{id}/attachments:
    $ref: "./paths/attachments.yaml#/~1api~1v1~1expenses~1{id}~1attachments"
  /api/v1/expenses/{id}/attachments/{aid}:
    $ref: "./paths/attachments.yaml#/~1api~1v1~1expenses~1{id}~1attachments~1{aid}"

  # Reports
  /api/v1/reports/pl:
    $ref: "./paths/reports.yaml#/~1api~1v1~1reports~1pl"

  # Admin
  /api/v1/admin/users:
    $ref: "./paths/admin.yaml#/~1api~1v1~1admin~1users"
  /api/v1/admin/users/{id}/disable:
    $ref: "./paths/admin.yaml#/~1api~1v1~1admin~1users~1{id}~1disable"
  /api/v1/admin/users/{id}/enable:
    $ref: "./paths/admin.yaml#/~1api~1v1~1admin~1users~1{id}~1enable"
  /api/v1/admin/users/{id}/unlock:
    $ref: "./paths/admin.yaml#/~1api~1v1~1admin~1users~1{id}~1unlock"
  /api/v1/admin/users/{id}/force-password-reset:
    $ref: "./paths/admin.yaml#/~1api~1v1~1admin~1users~1{id}~1force-password-reset"

  # Tokens
  /api/v1/tokens/claims:
    $ref: "./paths/tokens.yaml#/~1api~1v1~1tokens~1claims"
  /.well-known/jwks.json:
    $ref: "./paths/tokens.yaml#/~1.well-known~1jwks.json"

  # Test Support
  /api/v1/test/reset-db:
    $ref: "./paths/test-support.yaml#/~1api~1v1~1test~1reset-db"
  /api/v1/test/promote-admin:
    $ref: "./paths/test-support.yaml#/~1api~1v1~1test~1promote-admin"
