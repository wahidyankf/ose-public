openapi: 3.1.0
info:
  title: OrganicLever API
  description: REST API contract for the OrganicLever productivity platform
  version: 1.0.0
  contact:
    name: Open Sharia Enterprise
    url: https://github.com/wahidyankf/ose-public

servers:
  - url: http://localhost:8202
    description: Local development

tags:
  - name: Health
    description: Service health checks
  - name: Authentication
    description: Google OAuth authentication and token management

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Auth
    AuthGoogleRequest:
      $ref: "./schemas/auth.yaml#/AuthGoogleRequest"
    AuthTokenResponse:
      $ref: "./schemas/auth.yaml#/AuthTokenResponse"
    RefreshRequest:
      $ref: "./schemas/auth.yaml#/RefreshRequest"

    # User
    UserProfile:
      $ref: "./schemas/user.yaml#/UserProfile"

    # Common
    ErrorResponse:
      $ref: "./schemas/error.yaml#/ErrorResponse"
    HealthResponse:
      $ref: "./schemas/health.yaml#/HealthResponse"

paths:
  # Health
  /api/v1/health:
    $ref: "./paths/health.yaml#/~1api~1v1~1health"

  # Authentication
  /api/v1/auth/google:
    $ref: "./paths/auth.yaml#/~1api~1v1~1auth~1google"
  /api/v1/auth/refresh:
    $ref: "./paths/auth.yaml#/~1api~1v1~1auth~1refresh"
  /api/v1/auth/me:
    $ref: "./paths/auth.yaml#/~1api~1v1~1auth~1me"
