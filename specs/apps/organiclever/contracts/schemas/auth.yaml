AuthGoogleRequest:
  type: object
  description: Google OAuth login request with ID token
  required:
    - idToken
  properties:
    idToken:
      type: string
      description: Google ID token obtained from Google Sign-In

AuthTokenResponse:
  type: object
  description: Authentication token pair returned on login or refresh
  required:
    - accessToken
    - refreshToken
    - tokenType
  properties:
    accessToken:
      type: string
    refreshToken:
      type: string
    tokenType:
      type: string
      example: Bearer

RefreshRequest:
  type: object
  description: Token refresh request
  required:
    - refreshToken
  properties:
    refreshToken:
      type: string
