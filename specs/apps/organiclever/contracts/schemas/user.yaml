UserProfile:
  type: object
  description: Authenticated user profile from Google OAuth
  required:
    - id
    - email
    - name
    - avatarUrl
    - createdAt
    - updatedAt
  properties:
    id:
      type: string
      format: uuid
    email:
      type: string
      format: email
    name:
      type: string
    avatarUrl:
      type: string
      format: uri
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
